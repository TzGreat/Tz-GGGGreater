<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>企业员工管理系统 - 登录</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <style>
        :root {
            --primary-color: #3498db;
            --secondary-color: #2c3e50;
            --success-color: #2ecc71;
            --danger-color: #e74c3c;
        }

        body {
            background: linear-gradient(135deg, var(--secondary-color), var(--primary-color));
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }

        .login-container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            width: 100%;
            max-width: 400px;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-header {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            padding: 30px 20px;
            text-align: center;
        }

        .login-header h2 {
            margin: 0;
            font-weight: 600;
        }

        .login-header p {
            margin: 5px 0 0 0;
            opacity: 0.9;
        }

        .login-body {
            padding: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            font-weight: 600;
            color: var(--secondary-color);
            margin-bottom: 8px;
        }

        .form-control {
            border: 2px solid #e9ecef;
            border-radius: 8px;
            padding: 12px 15px;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 0.2rem rgba(52, 152, 219, 0.25);
        }

        .input-group-text {
            background-color: #f8f9fa;
            border: 2px solid #e9ecef;
            border-right: none;
        }

        .btn-login {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            border: none;
            border-radius: 8px;
            color: white;
            padding: 12px;
            font-weight: 600;
            width: 100%;
            transition: all 0.3s ease;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .btn-login:disabled {
            opacity: 0.6;
            transform: none;
            box-shadow: none;
        }

        .alert {
            border-radius: 8px;
            border: none;
            padding: 12px 15px;
        }

        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #ffffff;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 1s ease-in-out infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .login-footer {
            text-align: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #e9ecef;
        }

        .login-footer a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 500;
        }

        .login-footer a:hover {
            text-decoration: underline;
        }

        .demo-accounts {
            background-color: #f8f9fa;
            border-radius: 8px;
            padding: 15px;
            margin-top: 20px;
            font-size: 0.9rem;
        }

        .demo-accounts h6 {
            margin-bottom: 10px;
            color: var(--secondary-color);
        }

        .demo-account {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            padding: 5px 0;
            border-bottom: 1px solid #e9ecef;
        }

        .demo-account:last-child {
            border-bottom: none;
            margin-bottom: 0;
        }
    </style>
</head>
<body>
<div id="app">
    <div class="login-container">
        <!-- 登录头部 -->
        <div class="login-header">
            <i class="fas fa-building fa-3x mb-3"></i>
            <h2>企业员工管理系统</h2>
            <p>请登录您的账户</p>
        </div>

        <!-- 登录表单 -->
        <div class="login-body">
            <!-- 错误提示 -->
            <div v-if="errorMessage" class="alert alert-danger alert-dismissible fade show" role="alert">
                <i class="fas fa-exclamation-circle me-2"></i>
                {{ errorMessage }}
                <button type="button" class="btn-close" @click="errorMessage = ''"></button>
            </div>

            <!-- 成功提示 -->
            <div v-if="successMessage" class="alert alert-success alert-dismissible fade show" role="alert">
                <i class="fas fa-check-circle me-2"></i>
                {{ successMessage }}
                <button type="button" class="btn-close" @click="successMessage = ''"></button>
            </div>

            <form @submit.prevent="handleLogin">
                <!-- 用户名输入 -->
                <div class="form-group">
                    <label for="username" class="form-label">
                        <i class="fas fa-user me-2"></i>用户名
                    </label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-user"></i></span>
                        <input
                                type="text"
                                class="form-control"
                                id="username"
                                placeholder="请输入用户名"
                                v-model="loginForm.username"
                                required
                                :disabled="loading"
                        >
                    </div>
                </div>

                <!-- 密码输入 -->
                <div class="form-group">
                    <label for="password" class="form-label">
                        <i class="fas fa-lock me-2"></i>密码
                    </label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-lock"></i></span>
                        <input
                                type="password"
                                class="form-control"
                                id="password"
                                placeholder="请输入密码"
                                v-model="loginForm.password"
                                required
                                :disabled="loading"
                        >
                    </div>
                </div>

                <!-- 登录按钮 -->
                <button
                        type="submit"
                        class="btn btn-login"
                        :disabled="loading || !loginForm.username || !loginForm.password"
                >
                    <span v-if="loading" class="loading-spinner"></span>
                    <i v-else class="fas fa-sign-in-alt me-2"></i>
                    {{ loading ? '登录中...' : '登录' }}
                </button>
            </form>

            <!-- 演示账户信息 -->
            <div class="demo-accounts">
                <h6><i class="fas fa-info-circle me-2"></i>演示账户</h6>
                <div class="demo-account">
                    <span>管理员账户:</span>
                    <span><strong>admin</strong> / <strong>admin123</strong></span>
                </div>
                <div class="demo-account">
                    <span>普通用户:</span>
                    <span><strong>user</strong> / <strong>user123</strong></span>
                </div>
            </div>

            <!-- 页脚 -->
            <div class="login-footer">
                <p class="text-muted">
                    <small>还没有账户？ <a href="#" @click="showRegister = true">立即注册</a></small>
                </p>
            </div>
        </div>
        <!-- 在登录表单后添加测试区域 -->
        <div class="mt-3 p-3 border rounded">
            <h6 class="text-muted">调试信息</h6>
            <button class="btn btn-sm btn-outline-secondary me-2" @click="testLocalStorage">
                检查LocalStorage
            </button>
            <button class="btn btn-sm btn-outline-secondary me-2" @click="testJump">
                测试跳转
            </button>
            <button class="btn btn-sm btn-outline-danger" @click="clearStorage">
                清除存储
            </button>
        </div>
    </div>

    <!-- 注册模态框 -->
    <div v-if="showRegister" class="modal fade show d-block" style="background: rgba(0,0,0,0.5)">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header" style="background: linear-gradient(135deg, var(--primary-color), var(--secondary-color)); color: white;">
                    <h5 class="modal-title">注册新账户</h5>
                    <button type="button" class="btn-close btn-close-white" @click="showRegister = false"></button>
                </div>
                <div class="modal-body">
                    <form @submit.prevent="handleRegister">
                        <div class="row">
                            <div class="col-12 mb-3">
                                <label class="form-label">用户名</label>
                                <input type="text" class="form-control" v-model="registerForm.username" required>
                            </div>
                            <div class="col-12 mb-3">
                                <label class="form-label">密码</label>
                                <input type="password" class="form-control" v-model="registerForm.password" required>
                            </div>
                            <div class="col-12 mb-3">
                                <label class="form-label">邮箱</label>
                                <input type="email" class="form-control" v-model="registerForm.email">
                            </div>
                        </div>
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary" :disabled="loading">
                                {{ loading ? '注册中...' : '注册' }}
                            </button>
                            <button type="button" class="btn btn-secondary" @click="showRegister = false">
                                取消
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="auth.js"></script>
<script>
    const { createApp } = Vue;

    createApp({
        data() {
            return {
                loginForm: {
                    username: '',
                    password: ''
                },
                registerForm: {
                    username: '',
                    password: '',
                    email: '',
                    role: 'USER'
                },
                loading: false,
                errorMessage: '',
                successMessage: '',
                showRegister: false
            }
        },
        async mounted() {
            console.log('🚀 登录页面初始化...');
            console.log('当前URL:', window.location.href);
            console.log('初始localStorage:');
            console.log(' - token:', localStorage.getItem('token'));
            console.log(' - userInfo:', localStorage.getItem('userInfo'));

            // 检查登录状态
            if (auth.isLoggedIn()) {
                console.log('📱 用户已登录，自动跳转...');
                window.location.href = 'index.html';
                return;
            } else {
                console.log('🔓 用户未登录，显示登录表单');
            }

            // 设置演示账户
            this.loginForm.username = 'admin';
            this.loginForm.password = 'admin123';
            console.log('👤 演示账户已填充');
        },
        methods: {
            async handleLogin() {
                this.loading = true;
                this.errorMessage = '';
                this.successMessage = '';

                try {
                    console.log('🔄 调用auth.login...');
                    const result = await auth.login(this.loginForm.username, this.loginForm.password);

                    console.log('📝 登录结果:', result);

                    if (result.success) {
                        this.successMessage = result.message;
                        console.log('✅ 登录成功，准备跳转...');

                        // 🆕 立即跳转，不等待
                        window.location.href = 'index.html';
                    } else {
                        this.errorMessage = result.message;
                        console.error('❌ 登录失败:', result.message);
                    }
                } catch (error) {
                    this.errorMessage = '登录过程发生未知错误';
                    console.error('💥 登录过程异常:', error);
                } finally {
                    this.loading = false;
                }
            },

            async handleRegister() {
                this.loading = true;
                this.errorMessage = '';

                try {
                    const result = await auth.register(this.registerForm);

                    if (result.success) {
                        this.successMessage = result.message;
                        this.showRegister = false;
                        this.registerForm = { username: '', password: '', email: '', role: 'USER' };
                    } else {
                        this.errorMessage = result.message;
                    }
                } catch (error) {
                    this.errorMessage = '注册过程中发生错误，请重试';
                    console.error('注册错误:', error);
                } finally {
                    this.loading = false;
                }
            },
            // 🆕 添加测试方法
            testLocalStorage() {
                console.log('=== LocalStorage 状态 ===');
                console.log('Token:', localStorage.getItem('token'));
                console.log('UserInfo:', localStorage.getItem('userInfo'));
                alert(`Token: ${localStorage.getItem('token')}\nUserInfo: ${localStorage.getItem('userInfo')}`);
            },

            testJump() {
                console.log('手动跳转到首页');
                window.location.href = 'index.html';
            },

            clearStorage() {
                localStorage.clear();
                console.log('LocalStorage 已清除');
                alert('存储已清除');
            }
        }
    }).mount('#app');
</script>
</body>
</html>
